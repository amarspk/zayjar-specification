# ========================================================
# NGINX PRODUCTION INGRESS REVERSE PROXY CONFIGURATION
# Per DOC-010 Appendix D.2
# ========================================================

# Rate limiting zones declaration per DOC-006 5.6
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;

upstream core_backend_upstream {
    server api-core:8000;
    keepalive 32;
}

upstream qr_frontend_upstream {
    server qr-menu-app:3000;
    keepalive 32;
}

upstream backoffice_frontend_upstream {
    server backoffice-app:3000;
    keepalive 32;
}

# 1. Redirection: Force secure SSL across all environments
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# 2. Dynamic Routing: Customer QR Menus & Ordering (Wildcard subdomains)
server {
    listen 443 ssl http2;
    server_name *.zayjar.com;

    # SSL Certificate binds managed via ACM
    ssl_certificate /etc/letsencrypt/live/zayjar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zayjar.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Injecting Security Headers globally per DOC-006 5.4
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://cdn.zayjar.com;" always;

    # Route API queries securely with rate limiting
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://core_backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Correlation-ID $request_id;
    }

    # Route real-time KDS WebSockets per DOC-008 7.6
    location /socket.io/ {
        proxy_pass http://core_backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Proxy route fallback to QR Menu static web server
    location / {
        proxy_pass http://qr_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# 3. Backoffice routing (admin.zayjar.com or backoffice subdomain)
server {
    listen 443 ssl http2;
    server_name admin.zayjar.com backoffice.zayjar.com;

    ssl_certificate /etc/letsencrypt/live/zayjar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zayjar.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://core_backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://backoffice_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
